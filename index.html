
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活碎片 | Life Fragments</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9f7f2;
            --accent-color: #7d8471;
            --text-primary: #434343;
            --text-secondary: #8c8c8c;
            --card-bg: #ffffff;
            --border-color: #e0ddd5;
            --alert-red: #c66b6b;
            --warn-yellow: #d4a373;
        }

        body { font-family: 'Noto Serif TC', serif; background-color: var(--bg-color); color: var(--text-primary); margin: 0; line-height: 1.6; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-weight: 700; letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 5px; }
        header p { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        nav { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        nav::-webkit-scrollbar { display: none; }
        nav button { border: none; background: none; padding: 10px 15px; font-family: inherit; color: var(--text-secondary); cursor: pointer; font-size: 0.95rem; flex-shrink: 0; }
        nav button.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); font-weight: bold; }

        section.input-area { background: var(--card-bg); padding: 20px; border-radius: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 20px; border: 1px solid var(--border-color); }
        .filter-area { margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 15px; border-bottom: 1px dashed var(--border-color); }
        
        .category-quick-filter { 
            display: flex; 
            flex-wrap: wrap;
            gap: 10px 8px;
            margin-bottom: 15px; 
            padding-bottom: 5px; 
        }
        .category-quick-filter::-webkit-scrollbar { display: none; }
        .cat-btn { font-size: 0.75rem; padding: 4px 12px; border: 1px solid var(--border-color); border-radius: 20px; background: white; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .cat-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input, select, textarea { padding: 10px 0; border: none; border-bottom: 1px solid var(--border-color); font-family: inherit; background: transparent; outline: none; color: var(--text-primary); width: 100%; margin-bottom: 10px; border-radius: 0; -webkit-appearance: none; }
        textarea { height: 60px; resize: none; border-bottom: 1px solid var(--border-color); }
        .filter-input { font-size: 0.85rem; flex: 2; min-width: 150px; margin-bottom: 0; }
        .filter-select { font-size: 0.85rem; flex: 1; margin-bottom: 0; }

        button.add-btn { background-color: var(--accent-color); color: white; border: none; width: 100%; padding: 12px; letter-spacing: 2px; cursor: pointer; font-family: inherit; transition: 0.2s; }
        button.add-btn:active { opacity: 0.8; }

        .item-card { border-bottom: 1px solid var(--border-color); padding: 15px 5px; display: flex; justify-content: space-between; align-items: center; }
        .item-info h4 { margin: 0; font-size: 1rem; font-weight: 400; }
        .item-info p { margin: 0; font-size: 0.8rem; color: var(--text-secondary); white-space: pre-wrap; }
        .tag { font-size: 0.7rem; padding: 2px 6px; border: 1px solid var(--border-color); border-radius: 10px; margin-right: 5px; color: var(--accent-color); }
        .delete-link { font-size: 0.8rem; color: #d1d1d1; cursor: pointer; padding: 5px; }

        .empty-state { text-align: center; color: var(--text-secondary); margin-top: 30px; font-size: 0.85rem; }

        .date-field { margin-bottom: 10px; }
        .date-label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 2px; letter-spacing: 0.5px; }
        .date-field input { margin-bottom: 0; }

        /* ── 備份分頁專用樣式 ── */
        .backup-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            padding: 24px 20px;
            margin-bottom: 16px;
        }
        .backup-section h3 {
            margin: 0 0 6px 0;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-primary);
        }
        .backup-section p {
            margin: 0 0 16px 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .backup-btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 2px;
            transition: 0.2s;
            box-sizing: border-box;
        }
        .backup-btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
        }
        .backup-btn-primary:active { opacity: 0.8; }
        .backup-btn-outline {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }
        .backup-btn-outline:active { background: #f0f0ec; }
        .backup-btn-danger {
            background: transparent;
            color: var(--alert-red);
            border: 1px solid var(--alert-red);
            margin-top: 8px;
        }
        .backup-btn-danger:active { background: #fdf0f0; }

        /* 隱藏的 file input */
        #restore-file-input { display: none; }

        /* 拖曳上傳區 */
        .drop-zone {
            border: 1.5px dashed var(--border-color);
            border-radius: 2px;
            padding: 28px 16px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent-color);
            background: #f4f3ee;
            color: var(--accent-color);
        }
        .drop-zone .drop-icon { font-size: 1.8rem; display: block; margin-bottom: 8px; }

        /* Toast 提示 */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #434343;
            color: white;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.85rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 9999;
            white-space: nowrap;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 備份統計 */
        .backup-stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .stat-chip {
            font-size: 0.75rem;
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            background: white;
        }
        .stat-chip span { color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>生活碎片</h1>
            <p>Life Fragments Archive</p>
        </header>

        <nav>
            <button onclick="showTab('media')" id="btn-media" class="active">閱聽</button>
            <button onclick="showTab('selflove')" id="btn-selflove">對自己好</button>
            <button onclick="showTab('finance')" id="btn-finance">餘裕</button>
            <button onclick="showTab('notes')" id="btn-notes">隨手記記</button>
            <button onclick="showTab('settings')" id="btn-settings">備份</button>
        </nav>

        <!-- 閱聽 -->
        <div id="media" class="tab-content active">
            <section class="input-area">
                <select id="media-type">
                    <option value="書籍">書籍</option>
                    <option value="影集">影集</option>
                    <option value="電影">電影</option>
                    <option value="展覽">展覽</option>
                    <option value="遊戲">遊戲</option>
                </select>
                <input type="text" id="media-title" placeholder="標題名稱">
                <select id="media-rating">
                    <option value="5">♥♥♥♥♥ </option>
                    <option value="4">♥♥♥♥ </option>
                    <option value="3">♥♥♥ </option>
                    <option value="2">♥♥ </option>
                    <option value="1">♥ </option>
                </select>
                <input type="date" id="media-date">
                <button class="add-btn" onclick="addData('media')">記下一筆</button>
            </section>
            <div class="category-quick-filter" id="media-quick-filters">
                <button class="cat-btn active" onclick="filterByCategory('media', '全部')">全部</button>
                <button class="cat-btn" onclick="filterByCategory('media', '書籍')">書</button>
                <button class="cat-btn" onclick="filterByCategory('media', '影集')">影集</button>
                <button class="cat-btn" onclick="filterByCategory('media', '電影')">電影</button>
                <button class="cat-btn" onclick="filterByCategory('media', '展覽')">展覽</button>
                <button class="cat-btn" onclick="filterByCategory('media', '遊戲')">遊戲</button>
            </div>
            <div class="filter-area" id="filter-media"></div>
            <div id="media-list"></div>
        </div>

        <!-- 對自己好 -->
        <div id="selflove" class="tab-content">
            <section class="input-area">
                <select id="selflove-type">
                    <option value="化妝品">化妝品</option>
                    <option value="保養品">保養品</option>
                    <option value="吃">吃</option>
                    <option value="服飾包包">服飾包包</option>
                    <option value="玩具公仔">玩具公仔</option>
                    <option value="旅行">旅行</option>
                    <option value="其他">其他</option>
                </select>
                <input type="text" id="selflove-name" placeholder="產品或犒賞名稱">
                <input type="number" id="selflove-price" placeholder="金額">
                <div class="date-field">
                    <label class="date-label">購買日期</label>
                    <input type="date" id="selflove-buy-date">
                </div>
                <div class="date-field">
                    <label class="date-label">到期日期 <span style="color:var(--text-secondary);font-size:0.75rem;">（非必填）</span></label>
                    <input type="date" id="selflove-expiry-date">
                </div>
                <button class="add-btn" onclick="addData('selflove')">留存美好</button>
            </section>
            <div class="category-quick-filter" id="selflove-quick-filters">
                <button class="cat-btn active" onclick="filterByCategory('selflove', '全部')">全部</button>
                <button class="cat-btn" onclick="filterByCategory('selflove', '化妝品')">化妝品</button>
                <button class="cat-btn" onclick="filterByCategory('selflove', '保養品')">保養品</button>
                <button class="cat-btn" onclick="filterByCategory('selflove', '吃')">吃</button>
                <button class="cat-btn" onclick="filterByCategory('selflove', '服飾包包')">服飾包包</button>
                <button class="cat-btn" onclick="filterByCategory('selflove', '玩具公仔')">玩具公仔</button>
                <button class="cat-btn" onclick="filterByCategory('selflove', '旅行')">旅行</button>            
                <button class="cat-btn" onclick="filterByCategory('selflove', '其他')">其他</button>
            </div>
            <div class="filter-area" id="filter-selflove"></div>
            <div id="selflove-list"></div>
        </div>

        <!-- 餘裕 -->
        <div id="finance" class="tab-content">
             <section class="input-area">
                <select id="finance-type">
                    <option value="中國信託">中國信託</option>
                    <option value="永豐銀行">永豐銀行</option>
                    <option value="台新銀行">台新銀行</option>
                    <option value="玉山銀行">玉山銀行</option>
                    <option value="LINE BANK">LINE BANK</option>
                    <option value="第一銀行">第一銀行</option>
                    <option value="國泰世華">國泰世華</option>
                    <option value="富邦銀行">富邦銀行</option>
                    <option value="合作金庫">合作金庫</option>
                </select>
                <input type="text" id="finance-title" placeholder="結餘">
                <input type="date" id="finance-date">
                <button class="add-btn" onclick="addData('finance')">記下一筆</button>
            </section>
            <div class="category-quick-filter" id="finance-quick-filters">
                <button class="cat-btn active" onclick="filterByCategory('finance', '全部')">全部</button>
                <button class="cat-btn" onclick="filterByCategory('finance', '中信')">中信</button>
                <button class="cat-btn" onclick="filterByCategory('finance', '永豐')">永豐</button>
                <button class="cat-btn" onclick="filterByCategory('finance', '台新')">台新</button>
                <button class="cat-btn" onclick="filterByCategory('finance', '玉山')">玉山</button>
                <button class="cat-btn" onclick="filterByCategory('finance', 'LINE')">LINE</button>
                <button class="cat-btn" onclick="filterByCategory('finance', '一銀')">一銀</button>
                <button class="cat-btn" onclick="filterByCategory('finance', '國泰')">國泰</button>
                <button class="cat-btn" onclick="filterByCategory('finance', '富邦')">富邦</button>
                <button class="cat-btn" onclick="filterByCategory('finance', '合庫')">合庫</button>
            </div>
            <div class="filter-area" id="filter-finance"></div>
            <div id="finance-list"></div>
        </div>

        <!-- 隨手記記 -->
        <div id="notes" class="tab-content">
            <section class="input-area">
                <input type="text" id="note-title" placeholder="記點什麼標題...">
                <textarea id="note-content" placeholder="細節內容..."></textarea>
                <input type="date" id="note-date">
                <button class="add-btn" onclick="addData('notes')">封存瞬間</button>
            </section>
            <div class="filter-area" id="filter-notes"></div>
            <div id="notes-list"></div>
        </div>

        <!-- 備份 -->
        <div id="settings" class="tab-content">

            <!-- 目前資料統計 -->
            <div class="backup-section">
                <h3>目前資料</h3>
                <p>存放在這台裝置的碎片數量。</p>
                <div class="backup-stats" id="backup-stats"></div>
            </div>

            <!-- 下載備份 -->
            <div class="backup-section">
                <h3>下載備份</h3>
                <p>將所有紀錄匯出成 JSON 檔案，可保存至相簿、雲端硬碟或任何你信任的地方。</p>
                <button class="backup-btn backup-btn-primary" onclick="downloadBackup()">下載備份檔案</button>
            </div>

            <!-- 還原備份 -->
            <div class="backup-section">
                <h3>還原備份</h3>
                <p>上傳先前下載的備份 JSON 檔案。<br>
                   ⚠️ 請注意：<b>合併模式</b>會保留現有資料並加入備份中的新資料；<b>覆蓋模式</b>會清除現有資料並完全以備份取代。</p>

                <input type="file" id="restore-file-input" accept=".json" onchange="handleRestoreFile(event)">

                <div class="drop-zone" id="drop-zone"
                     onclick="document.getElementById('restore-file-input').click()"
                     ondragover="handleDragOver(event)"
                     ondragleave="handleDragLeave(event)"
                     ondrop="handleDrop(event)">
                    <span class="drop-icon">📂</span>
                    點此選取 JSON 備份檔，或將檔案拖曳到這裡
                </div>

                <button class="backup-btn backup-btn-outline" onclick="triggerRestore('merge')">合併還原（保留現有資料）</button>
                <button class="backup-btn backup-btn-danger" onclick="triggerRestore('overwrite')">覆蓋還原（取代現有資料）</button>
            </div>

        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
        const tabs = ['media', 'selflove', 'finance', 'notes'];
        let currentFilters = { media: '全部', selflove: '全部' };
        let pendingRestoreData = null;   // 已讀取但尚未確認的備份
        let pendingRestoreMode = null;

        function getTodayString() { return new Date().toISOString().split('T')[0]; }

        function showToast(msg, duration = 2500) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        function resetDates() {
            const today = getTodayString();
            document.querySelectorAll('input[type="date"]').forEach(el => {
                if (el.id !== 'selflove-expiry-date') el.value = today;
            });
        }

        function initFilters() {
            tabs.forEach(tab => {
                const area = document.getElementById(`filter-${tab}`);
                const data = JSON.parse(localStorage.getItem(tab) || '[]');
                const sysYear = new Date().getFullYear();
                let maxDataYear = sysYear;
                data.forEach(item => {
                    const itemDate = (tab === 'selflove') ? item.buyDate : item.date;
                    if (itemDate) {
                        const y = parseInt(itemDate.split('-')[0]);
                        if (y > maxDataYear) maxDataYear = y;
                    }
                });

                let html = `<select id="f-${tab}-year" class="filter-select" onchange="renderData('${tab}')"><option value="">年份</option>`;
                for (let i = maxDataYear; i >= 2020; i--) {
                    html += `<option value="${i}">${i}年</option>`;
                }
                html += `</select><select id="f-${tab}-month" class="filter-select" onchange="renderData('${tab}')"><option value="">月份</option>`;
                for (let i = 1; i <= 12; i++) html += `<option value="${i.toString().padStart(2, '0')}">${i}月</option>`;
                html += `</select><input type="text" id="f-${tab}-search" class="filter-input" placeholder="關鍵字搜尋..." oninput="renderData('${tab}')">`;
                area.innerHTML = html;
            });
        }

        function filterByCategory(tab, category) {
            currentFilters[tab] = category;
            const buttons = document.querySelectorAll(`#${tab}-quick-filters .cat-btn`);
            buttons.forEach(btn => {
                let btnText = btn.innerText;
                if (tab === 'media' && btnText === '書') btnText = '書籍';
                btn.classList.toggle('active', btnText === category);
            });
            renderData(tab);
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            if (tabId === 'settings') {
                renderBackupStats();
            } else {
                renderData(tabId);
            }
        }

        function addData(type) {
            let data = JSON.parse(localStorage.getItem(type) || '[]');
            let entry = { id: Date.now() };
            const today = getTodayString();

            if (type === 'media') {
                entry.category = document.getElementById('media-type').value;
                entry.title = document.getElementById('media-title').value;
                entry.rating = document.getElementById('media-rating').value;
                entry.date = document.getElementById('media-date').value || today;
                if (!entry.title) return;
                document.getElementById('media-title').value = '';
            } else if (type === 'selflove') {
                entry.category = document.getElementById('selflove-type').value;
                entry.name = document.getElementById('selflove-name').value;
                entry.price = document.getElementById('selflove-price').value;
                entry.buyDate = document.getElementById('selflove-buy-date').value || today;
                entry.expiryDate = document.getElementById('selflove-expiry-date').value;
                if (!entry.name) return;
                document.getElementById('selflove-name').value = '';
                document.getElementById('selflove-price').value = '';
                document.getElementById('selflove-expiry-date').value = '';
            } else if (type === 'finance') {
                entry.category = document.getElementById('finance-type').value;
                entry.title = document.getElementById('finance-title').value;
                entry.date = document.getElementById('finance-date').value || today;
                if (!entry.title) return;
                document.getElementById('finance-title').value = '';
            } else if (type === 'notes') {
                entry.title = document.getElementById('note-title').value;
                entry.content = document.getElementById('note-content').value;
                entry.date = document.getElementById('note-date').value || today;
                if (!entry.title && !entry.content) return;
                document.getElementById('note-title').value = '';
                document.getElementById('note-content').value = '';
            }

            data.unshift(entry);
            localStorage.setItem(type, JSON.stringify(data));
            resetDates();
            initFilters();
            renderData(type);
        }

        function deleteData(type, id) {
            if (!confirm('確定要移除這項紀錄嗎？')) return;
            let data = JSON.parse(localStorage.getItem(type)).filter(item => item.id !== id);
            localStorage.setItem(type, JSON.stringify(data));
            renderData(type);
        }

        function renderData(type) {
            const container = document.getElementById(type + '-list');
            let data = JSON.parse(localStorage.getItem(type) || '[]');
            const fYear = document.getElementById(`f-${type}-year`).value;
            const fMonth = document.getElementById(`f-${type}-month`).value;
            const fSearch = document.getElementById(`f-${type}-search`).value.toLowerCase();

            data = data.filter(i => {
                const dateKey = (type === 'selflove') ? i.buyDate : i.date;
                const matchYear = fYear ? (dateKey || '').startsWith(fYear) : true;
                const matchMonth = fMonth ? (dateKey || '').split('-')[1] === fMonth : true;

                let matchCategory = true;
                if ((type === 'media' || type === 'selflove') && currentFilters[type] !== '全部') {
                    matchCategory = (i.category === currentFilters[type]);
                }

                let nameKey = "";
                if (type === 'media') nameKey = (i.title + i.category);
                else if (type === 'selflove') nameKey = (i.name + i.category);
                else if (type === 'finance') nameKey = (i.category || '') + (i.title || '');
                else if (type === 'notes') nameKey = (i.title + i.content);

                const matchSearch = fSearch ? nameKey.toLowerCase().includes(fSearch) : true;
                return matchYear && matchMonth && matchSearch && matchCategory;
            });

            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">尚未發現碎片。</div>';
                return;
            }

            let html = '';
            const today = new Date();
            data.forEach(i => {
                html += `<div class="item-card"><div class="item-info">`;
                if (type === 'media') {
                    html += `<h4><span class="tag">${i.category}</span>${i.title}</h4><p>${i.date} 紀錄</p>`;
                } else if (type === 'selflove') {
                    let status = '';
                    if (i.expiryDate) {
                        const exp = new Date(i.expiryDate);
                        const diffDays = (exp - today) / (1000 * 60 * 60 * 24);
                        if (diffDays < 0) status = '<span class="status-msg" style="color:var(--alert-red)">已過期</span>';
                        else if (diffDays <= 30) status = '<span class="status-msg" style="color:var(--warn-yellow)">即將到期</span>';
                    }
                    html += `<h4><span class="tag">${i.category}</span>${i.name}${status}</h4>`;
                    html += `<p>金額：$${Number(i.price || 0).toLocaleString()} / 購入：${i.buyDate}</p>`;
                    if (i.expiryDate) html += `<p style="font-size:0.75rem; color:var(--text-secondary)">效期：${i.expiryDate}</p>`;
                } else if (type === 'finance') {
                    html += `<h4><span class="tag">${i.category || ''}</span>${i.title || ''}</h4><p>${i.date}</p>`;
                } else if (type === 'notes') {
                    html += `<h4>${i.title || '無標題'}</h4><p>${i.content}</p><p style="font-size:0.7rem; color:var(--text-secondary)">${i.date}</p>`;
                }
                html += `</div><span class="delete-link" onclick="deleteData('${type}', ${i.id})">移除</span></div>`;
            });
            container.innerHTML = html;
        }

        /* ══════════════════════════════════
           備份功能
        ══════════════════════════════════ */

        function renderBackupStats() {
            const labels = { media: '閱聽', selflove: '對自己好', finance: '餘裕', notes: '隨手記記' };
            const container = document.getElementById('backup-stats');
            let html = '';
            tabs.forEach(t => {
                const count = JSON.parse(localStorage.getItem(t) || '[]').length;
                html += `<div class="stat-chip">${labels[t]} <span>${count}</span> 筆</div>`;
            });
            container.innerHTML = html;
        }

        function downloadBackup() {
            const backup = {
                exportedAt: new Date().toISOString(),
                version: 1,
                data: {}
            };
            tabs.forEach(t => {
                backup.data[t] = JSON.parse(localStorage.getItem(t) || '[]');
            });

            const json = JSON.stringify(backup, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const dateStr = new Date().toISOString().split('T')[0];
            a.href = url;
            a.download = `life-fragments-backup-${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('✓ 備份檔案已下載');
        }

        // 讀取檔案並暫存
        function readBackupFile(file) {
            return new Promise((resolve, reject) => {
                if (!file || !file.name.endsWith('.json')) {
                    reject('請選擇 .json 備份檔案');
                    return;
                }
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (!parsed.data) throw new Error('格式不符');
                        resolve(parsed);
                    } catch {
                        reject('檔案格式不正確，請確認是否為生活碎片備份檔。');
                    }
                };
                reader.onerror = () => reject('讀取檔案失敗');
                reader.readAsText(file);
            });
        }

        async function handleRestoreFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            try {
                pendingRestoreData = await readBackupFile(file);
                showToast(`✓ 已讀取備份（${new Date(pendingRestoreData.exportedAt).toLocaleDateString('zh-TW')}），請點選還原方式`);
            } catch (err) {
                showToast('⚠ ' + err, 3500);
                pendingRestoreData = null;
            }
            // 清空 input 以便下次重選
            event.target.value = '';
        }

        function triggerRestore(mode) {
            if (!pendingRestoreData) {
                showToast('請先選取備份 JSON 檔案', 2500);
                document.getElementById('restore-file-input').click();
                pendingRestoreMode = mode;
                return;
            }
            applyRestore(pendingRestoreData, mode);
        }

        function applyRestore(backup, mode) {
            const modeLabel = mode === 'merge' ? '合併' : '覆蓋';
            if (!confirm(`確定要${modeLabel}還原嗎？`)) return;

            tabs.forEach(t => {
                const incoming = backup.data[t] || [];
                if (mode === 'overwrite') {
                    localStorage.setItem(t, JSON.stringify(incoming));
                } else {
                    // 合併：以 id 去重
                    const existing = JSON.parse(localStorage.getItem(t) || '[]');
                    const existingIds = new Set(existing.map(x => x.id));
                    const merged = [...existing, ...incoming.filter(x => !existingIds.has(x.id))];
                    merged.sort((a, b) => b.id - a.id);
                    localStorage.setItem(t, JSON.stringify(merged));
                }
            });

            pendingRestoreData = null;
            initFilters();
            renderBackupStats();
            showToast(`✓ ${modeLabel}還原完成！`, 3000);
        }

        // 拖曳處理
        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.add('drag-over');
        }
        function handleDragLeave(e) {
            document.getElementById('drop-zone').classList.remove('drag-over');
        }
        async function handleDrop(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (!file) return;
            try {
                pendingRestoreData = await readBackupFile(file);
                showToast(`✓ 已讀取備份（${new Date(pendingRestoreData.exportedAt).toLocaleDateString('zh-TW')}），請點選還原方式`);
            } catch (err) {
                showToast('⚠ ' + err, 3500);
            }
        }

        window.onload = () => { resetDates(); initFilters(); renderData('media'); };
    </script>
</body>
</html>
