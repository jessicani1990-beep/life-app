<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活碎片 | Life Fragments</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9f7f2;
            --accent-color: #7d8471;
            --text-primary: #434343;
            --text-secondary: #8c8c8c;
            --card-bg: #ffffff;
            --border-color: #e0ddd5;
            --alert-red: #c66b6b;
            --warn-yellow: #d4a373;
            --period-red: #c66b6b;
            --period-light: #f7e8e8;
        }

        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Noto Serif TC', serif; background-color: var(--bg-color); color: var(--text-primary); margin: 0; line-height: 1.6; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-weight: 700; letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 5px; }
        header p { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        nav { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        nav::-webkit-scrollbar { display: none; }
        nav button { border: none; background: none; padding: 10px 12px; font-family: inherit; color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; flex-shrink: 0; }
        nav button.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); font-weight: bold; }

        section.input-area { background: var(--card-bg); padding: 20px; border-radius: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 16px; border: 1px solid var(--border-color); }
        .filter-area { margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 15px; border-bottom: 1px dashed var(--border-color); }

        .category-quick-filter { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .cat-btn { font-size: 0.75rem; padding: 4px 12px; border: 1px solid var(--border-color); border-radius: 20px; background: white; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .cat-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input, select, textarea { padding: 10px 0; border: none; border-bottom: 1px solid var(--border-color); font-family: inherit; background: transparent; outline: none; color: var(--text-primary); width: 100%; margin-bottom: 10px; border-radius: 0; -webkit-appearance: none; }
        textarea { height: 60px; resize: none; }
        .filter-input { font-size: 0.85rem; flex: 2; min-width: 150px; margin-bottom: 0; }
        .filter-select { font-size: 0.85rem; flex: 1; margin-bottom: 0; }

        button.add-btn { background-color: var(--accent-color); color: white; border: none; width: 100%; padding: 12px; letter-spacing: 2px; cursor: pointer; font-family: inherit; transition: 0.2s; margin-bottom: 0; }
        button.add-btn:active { opacity: 0.8; }

        .item-card { border-bottom: 1px solid var(--border-color); padding: 15px 5px; display: flex; justify-content: space-between; align-items: center; }
        .item-info h4 { margin: 0; font-size: 1rem; font-weight: 400; }
        .item-info p { margin: 0; font-size: 0.8rem; color: var(--text-secondary); white-space: pre-wrap; }
        .tag { font-size: 0.7rem; padding: 2px 6px; border: 1px solid var(--border-color); border-radius: 10px; margin-right: 5px; color: var(--accent-color); }
        .delete-link { font-size: 0.8rem; color: #d1d1d1; cursor: pointer; padding: 5px; flex-shrink: 0; }
        .empty-state { text-align: center; color: var(--text-secondary); margin-top: 30px; font-size: 0.85rem; }

        .date-field { margin-bottom: 10px; }
        .date-label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 2px; letter-spacing: 0.5px; }
        .date-field input { margin-bottom: 0; }

        .filter-group-label { font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 6px; }

        /* 收合式表單 */
        .add-toggle-btn { display: flex; align-items: center; gap: 8px; background: none; border: 1px dashed var(--border-color); width: 100%; padding: 11px 16px; font-family: inherit; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; margin-bottom: 16px; letter-spacing: 1px; transition: 0.2s; }
        .add-toggle-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
        .add-toggle-btn.open { border-color: var(--accent-color); color: var(--accent-color); border-style: solid; background: #fafaf8; }
        .toggle-icon { font-size: 1.1rem; line-height: 1; transition: transform 0.25s; display: inline-block; }
        .add-toggle-btn.open .toggle-icon { transform: rotate(45deg); }
        .collapsible-form { display: none; }
        .collapsible-form.open { display: block; }

        /* 效期提醒 */
        .expiry-alert { background: #fdf6f0; border: 1px solid var(--warn-yellow); padding: 16px 20px; margin-bottom: 16px; }
        .expiry-alert-title { font-size: 0.72rem; color: var(--warn-yellow); letter-spacing: 1.5px; margin-bottom: 10px; }
        .expiry-item { border-bottom: 1px dashed #f0e0cc; padding: 9px 0; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .expiry-item:last-child { border-bottom: none; padding-bottom: 0; }
        .expiry-item-name { font-size: 0.88rem; flex: 1; }
        .expiry-badge { font-size: 0.72rem; padding: 2px 9px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
        .badge-warn { background: #fef0e0; color: var(--warn-yellow); }
        .badge-urgent { background: #fce8e8; color: var(--alert-red); }
        .badge-expired { background: #f5e8e8; color: var(--alert-red); font-weight: bold; }

        /* 備份 */
        .backup-section { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 2px; padding: 24px 20px; margin-bottom: 16px; }
        .backup-section h3 { margin: 0 0 6px 0; font-size: 0.95rem; font-weight: 700; letter-spacing: 1px; }
        .backup-section p { margin: 0 0 16px 0; font-size: 0.8rem; color: var(--text-secondary); line-height: 1.7; }
        .backup-btn { display: block; width: 100%; padding: 12px; font-family: inherit; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; border-radius: 2px; transition: 0.2s; }
        .backup-btn-primary { background-color: var(--accent-color); color: white; border: none; }
        .backup-btn-outline { background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); }
        .backup-btn-outline:active { background: #f0f0ec; }
        .backup-btn-danger { background: transparent; color: var(--alert-red); border: 1px solid var(--alert-red); margin-top: 8px; }
        #restore-file-input { display: none; }
        .drop-zone { border: 1.5px dashed var(--border-color); border-radius: 2px; padding: 28px 16px; text-align: center; color: var(--text-secondary); font-size: 0.82rem; cursor: pointer; transition: 0.2s; margin-bottom: 12px; }
        .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent-color); background: #f4f3ee; color: var(--accent-color); }
        .drop-zone .drop-icon { font-size: 1.8rem; display: block; margin-bottom: 8px; }
        .backup-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .stat-chip { font-size: 0.75rem; padding: 4px 12px; border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-secondary); background: white; }
        .stat-chip span { color: var(--accent-color); font-weight: bold; }

        /* 餘裕總覽 */
        .finance-overview { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; margin-bottom: 16px; }
        .finance-overview h3 { font-size: 0.8rem; color: var(--text-secondary); letter-spacing: 1px; margin: 0 0 12px 0; font-weight: 400; }
        .finance-total { font-size: 1.6rem; font-weight: 700; color: var(--text-primary); margin-bottom: 15px; }
        .bank-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed var(--border-color); font-size: 0.85rem; }
        .bank-row:last-child { border-bottom: none; }
        .bank-name { color: var(--text-secondary); }

        /* 生理變化 */
        .body-subtabs { display: flex; margin-bottom: 20px; border: 1px solid var(--border-color); overflow: hidden; }
        .body-subtab { flex: 1; padding: 10px; text-align: center; font-size: 0.85rem; background: white; border: none; font-family: inherit; color: var(--text-secondary); cursor: pointer; transition: 0.2s; }
        .body-subtab.active { background: var(--accent-color); color: white; }
        .body-subcontent { display: none; }
        .body-subcontent.active { display: block; }

        .period-calendar { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; margin-bottom: 16px; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cal-nav { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--accent-color); padding: 5px 10px; width: auto; margin: 0; }
        .cal-title { font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .cal-day-name { text-align: center; font-size: 0.65rem; color: var(--text-secondary); padding: 4px 0; }
        .cal-day { text-align: center; font-size: 0.75rem; cursor: default; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 28px; height: 28px; margin: 0 auto; position: relative; }
        .cal-day.period-day { background: var(--period-light); color: var(--period-red); font-weight: 700; }
        .cal-day.symptom-day::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--warn-yellow); position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); }
        .cal-day.today { outline: 1.5px solid var(--accent-color); outline-offset: 1px; }
        .cal-day.predicted { background: #f0f3ee; color: var(--accent-color); font-style: italic; }
        .cal-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; font-size: 0.7rem; color: var(--text-secondary); }
        .cal-legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        .period-predict-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; margin-bottom: 16px; }
        .predict-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--border-color); font-size: 0.85rem; }
        .predict-row:last-child { border-bottom: none; }
        .predict-label { color: var(--text-secondary); }
        .predict-countdown { font-size: 1.4rem; font-weight: 700; color: var(--period-red); }

        .symptom-checks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .symptom-check-btn { font-size: 0.75rem; padding: 5px 12px; border: 1px solid var(--border-color); border-radius: 20px; background: white; color: var(--text-secondary); cursor: pointer; transition: 0.2s; }
        .symptom-check-btn.selected { background: var(--warn-yellow); color: white; border-color: var(--warn-yellow); }

        .weight-chart-wrap { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; margin-bottom: 16px; }
        .weight-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .weight-stat { font-size: 0.75rem; padding: 4px 12px; border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-secondary); background: white; }
        .weight-stat span { color: var(--accent-color); font-weight: bold; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #434343; color: white; padding: 10px 22px; border-radius: 20px; font-size: 0.85rem; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 9999; white-space: nowrap; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>生活碎片</h1>
        <p>Life Fragments Archive</p>
    </header>

    <nav>
        <button onclick="showTab('media')" id="btn-media" class="active">閱聽</button>
        <button onclick="showTab('selflove')" id="btn-selflove">對自己好</button>
        <button onclick="showTab('finance')" id="btn-finance">餘裕</button>
        <button onclick="showTab('body')" id="btn-body">生理變化</button>
        <button onclick="showTab('notes')" id="btn-notes">隨手記記</button>
        <button onclick="showTab('settings')" id="btn-settings">備份</button>
    </nav>

    <!-- 閱聽 -->
    <div id="media" class="tab-content active">
        <button class="add-toggle-btn" id="toggle-media-form" onclick="toggleForm('media-form',this)">
            <span class="toggle-icon">＋</span>新增紀錄
        </button>
        <div class="collapsible-form" id="media-form">
            <section class="input-area">
                <select id="media-type"><option value="書籍">書籍</option><option value="影集">影集</option><option value="電影">電影</option><option value="展覽">展覽</option><option value="遊戲">遊戲</option></select>
                <input type="text" id="media-title" placeholder="標題名稱">
                <select id="media-rating"><option value="5">♥♥♥♥♥</option><option value="4">♥♥♥♥</option><option value="3">♥♥♥</option><option value="2">♥♥</option><option value="1">♥</option></select>
                <input type="date" id="media-date">
                <button class="add-btn" onclick="addData('media')">記下一筆</button>
            </section>
        </div>
        <div class="filter-group-label">類型</div>
        <div class="category-quick-filter" id="media-quick-filters">
            <button class="cat-btn active" onclick="filterByCategory('media','全部')">全部</button>
            <button class="cat-btn" onclick="filterByCategory('media','書籍')">書</button>
            <button class="cat-btn" onclick="filterByCategory('media','影集')">影集</button>
            <button class="cat-btn" onclick="filterByCategory('media','電影')">電影</button>
            <button class="cat-btn" onclick="filterByCategory('media','展覽')">展覽</button>
            <button class="cat-btn" onclick="filterByCategory('media','遊戲')">遊戲</button>
        </div>
        <div class="filter-group-label">評分</div>
        <div class="category-quick-filter" id="media-rating-filters">
            <button class="cat-btn active" onclick="filterByRating('')">全部</button>
            <button class="cat-btn" onclick="filterByRating('5')">♥♥♥♥♥</button>
            <button class="cat-btn" onclick="filterByRating('4')">♥♥♥♥</button>
            <button class="cat-btn" onclick="filterByRating('3')">♥♥♥</button>
            <button class="cat-btn" onclick="filterByRating('2')">♥♥</button>
            <button class="cat-btn" onclick="filterByRating('1')">♥</button>
        </div>
        <div class="filter-area" id="filter-media"></div>
        <div id="media-list"></div>
    </div>

    <!-- 對自己好 -->
    <div id="selflove" class="tab-content">
        <div class="expiry-alert" id="selflove-expiry-alert" style="display:none;"></div>
        <button class="add-toggle-btn" id="toggle-selflove-form" onclick="toggleForm('selflove-form',this)">
            <span class="toggle-icon">＋</span>新增品項
        </button>
        <div class="collapsible-form" id="selflove-form">
            <section class="input-area">
                <select id="selflove-type"><option value="化妝品">化妝品</option><option value="保養品">保養品</option><option value="吃">吃</option><option value="服飾包包">服飾包包</option><option value="玩具公仔">玩具公仔</option><option value="旅行">旅行</option><option value="其他">其他</option></select>
                <input type="text" id="selflove-name" placeholder="產品或犒賞名稱">
                <input type="number" id="selflove-price" placeholder="金額">
                <div class="date-field"><label class="date-label">購買日期</label><input type="date" id="selflove-buy-date"></div>
                <div class="date-field"><label class="date-label">到期日期 <span style="color:var(--text-secondary);font-size:0.75rem;">（非必填）</span></label><input type="date" id="selflove-expiry-date"></div>
                <button class="add-btn" onclick="addData('selflove')">留存美好</button>
            </section>
        </div>
        <div class="category-quick-filter" id="selflove-quick-filters">
            <button class="cat-btn active" onclick="filterByCategory('selflove','全部')">全部</button>
            <button class="cat-btn" onclick="filterByCategory('selflove','化妝品')">化妝品</button>
            <button class="cat-btn" onclick="filterByCategory('selflove','保養品')">保養品</button>
            <button class="cat-btn" onclick="filterByCategory('selflove','吃')">吃</button>
            <button class="cat-btn" onclick="filterByCategory('selflove','服飾包包')">服飾包包</button>
            <button class="cat-btn" onclick="filterByCategory('selflove','玩具公仔')">玩具公仔</button>
            <button class="cat-btn" onclick="filterByCategory('selflove','旅行')">旅行</button>
            <button class="cat-btn" onclick="filterByCategory('selflove','其他')">其他</button>
        </div>
        <div class="filter-area" id="filter-selflove"></div>
        <div id="selflove-list"></div>
    </div>

    <!-- 餘裕 -->
    <div id="finance" class="tab-content">
        <div class="finance-overview" id="finance-overview"></div>
        <button class="add-toggle-btn" id="toggle-finance-form" onclick="toggleForm('finance-form',this)">
            <span class="toggle-icon">＋</span>新增結餘
        </button>
        <div class="collapsible-form" id="finance-form">
            <section class="input-area">
                <select id="finance-type"><option value="中國信託">中國信託</option><option value="永豐銀行">永豐銀行</option><option value="台新銀行">台新銀行</option><option value="玉山銀行">玉山銀行</option><option value="LINE BANK">LINE BANK</option><option value="第一銀行">第一銀行</option><option value="國泰世華">國泰世華</option><option value="富邦銀行">富邦銀行</option><option value="合作金庫">合作金庫</option></select>
                <input type="text" id="finance-title" placeholder="結餘金額">
                <input type="date" id="finance-date">
                <button class="add-btn" onclick="addData('finance')">記下一筆</button>
            </section>
        </div>
        <div class="category-quick-filter" id="finance-quick-filters">
            <button class="cat-btn active" onclick="filterByCategory('finance','全部')">全部</button>
            <button class="cat-btn" onclick="filterByCategory('finance','中信')">中信</button>
            <button class="cat-btn" onclick="filterByCategory('finance','永豐')">永豐</button>
            <button class="cat-btn" onclick="filterByCategory('finance','台新')">台新</button>
            <button class="cat-btn" onclick="filterByCategory('finance','玉山')">玉山</button>
            <button class="cat-btn" onclick="filterByCategory('finance','LINE')">LINE</button>
            <button class="cat-btn" onclick="filterByCategory('finance','一銀')">一銀</button>
            <button class="cat-btn" onclick="filterByCategory('finance','國泰')">國泰</button>
            <button class="cat-btn" onclick="filterByCategory('finance','富邦')">富邦</button>
            <button class="cat-btn" onclick="filterByCategory('finance','合庫')">合庫</button>
        </div>
        <div class="filter-area" id="filter-finance"></div>
        <div id="finance-list"></div>
    </div>

    <!-- 生理變化 -->
    <div id="body" class="tab-content">
        <div class="body-subtabs">
            <button class="body-subtab active" onclick="showBodyTab('period')" id="btn-period">生理期</button>
            <button class="body-subtab" onclick="showBodyTab('weight')" id="btn-weight">體重</button>
        </div>

        <div id="body-period" class="body-subcontent active">
            <div class="period-predict-card" id="period-predict"></div>
            <div class="period-calendar">
                <div class="cal-header">
                    <button class="cal-nav" onclick="changeCalMonth(-1)">&#8249;</button>
                    <span class="cal-title" id="cal-title"></span>
                    <button class="cal-nav" onclick="changeCalMonth(1)">&#8250;</button>
                </div>
                <div class="cal-grid" id="cal-grid"></div>
                <div class="cal-legend">
                    <div class="cal-legend-item"><div class="legend-dot" style="background:var(--period-light);border:1px solid var(--period-red);"></div>生理期</div>
                    <div class="cal-legend-item"><div class="legend-dot" style="background:var(--warn-yellow);width:6px;height:6px;"></div>症狀</div>
                    <div class="cal-legend-item"><div class="legend-dot" style="background:#f0f3ee;border:1px solid var(--accent-color);"></div>預測</div>
                    <div class="cal-legend-item"><div class="legend-dot" style="outline:1.5px solid var(--accent-color);outline-offset:1px;"></div>今天</div>
                </div>
            </div>

            <button class="add-toggle-btn" id="toggle-period-form" onclick="toggleForm('period-form',this)">
                <span class="toggle-icon">＋</span>記錄月經
            </button>
            <div class="collapsible-form" id="period-form">
                <section class="input-area">
                    <div style="font-size:0.78rem;color:var(--text-secondary);letter-spacing:1px;margin-bottom:12px;">月經紀錄</div>
                    <div class="date-field"><label class="date-label">開始日期</label><input type="date" id="period-start"></div>
                    <div class="date-field"><label class="date-label">結束日期 <span style="font-size:0.72rem;">（非必填，可之後補）</span></label><input type="date" id="period-end"></div>
                    <button class="add-btn" onclick="addPeriod()">記下這次月經</button>
                </section>
            </div>

            <button class="add-toggle-btn" id="toggle-symptom-form" onclick="toggleForm('symptom-form',this)">
                <span class="toggle-icon">＋</span>記錄症狀
            </button>
            <div class="collapsible-form" id="symptom-form">
                <section class="input-area">
                    <div style="font-size:0.78rem;color:var(--text-secondary);letter-spacing:1px;margin-bottom:12px;">症狀紀錄</div>

<div id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const tabs = ['media', 'selflove', 'finance', 'notes'];
const allStoreKeys = ['media', 'selflove', 'finance', 'notes', 'period', 'symptom', 'weight'];
let currentFilters = { media: '全部', selflove: '全部', finance: '全部' };
let currentRatingFilter = '';
let pendingRestoreData = null;
let calViewYear, calViewMonth;
let selectedSymptoms = [];
let currentPeriodSymptomFilter = '全部';
let weightChartInstance = null;

function getTodayString() { return new Date().toISOString().split('T')[0]; }

function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
}

function resetDates() {
    const today = getTodayString();
    document.querySelectorAll('input[type="date"]').forEach(el => {
        if (el.id !== 'selflove-expiry-date' && el.id !== 'period-end') el.value = today;
    });
}

function toggleForm(formId, btn) {
    const form = document.getElementById(formId);
    const isOpen = form.classList.contains('open');
    form.classList.toggle('open', !isOpen);
    btn.classList.toggle('open', !isOpen);
}

function closeForm(formId, btnId) {
    document.getElementById(formId).classList.remove('open');
    document.getElementById(btnId).classList.remove('open');
}

function initFilters() {
    tabs.forEach(tab => {
        const area = document.getElementById('filter-' + tab);
        const data = JSON.parse(localStorage.getItem(tab) || '[]');
        const sysYear = new Date().getFullYear();
        let maxYear = sysYear;
        data.forEach(item => {
            const d = tab === 'selflove' ? item.buyDate : item.date;
            if (d) { const y = parseInt(d.split('-')[0]); if (y > maxYear) maxYear = y; }
        });
        let html = '<select id="f-' + tab + '-year" class="filter-select" onchange="renderData(\'' + tab + '\')"><option value="">年份</option>';
        for (let i = maxYear; i >= 2020; i--) html += '<option value="' + i + '">' + i + '年</option>';
        html += '</select><select id="f-' + tab + '-month" class="filter-select" onchange="renderData(\'' + tab + '\')"><option value="">月份</option>';
        for (let i = 1; i <= 12; i++) html += '<option value="' + String(i).padStart(2,'0') + '">' + i + '月</option>';
        html += '</select><input type="text" id="f-' + tab + '-search" class="filter-input" placeholder="關鍵字搜尋..." oninput="renderData(\'' + tab + '\')">';
        area.innerHTML = html;
    });
}

function filterByCategory(tab, category) {
    currentFilters[tab] = category;
    document.querySelectorAll('#' + tab + '-quick-filters .cat-btn').forEach(btn => {
        let t = btn.innerText;
        if (tab === 'media' && t === '書') t = '書籍';
        btn.classList.toggle('active', t === category);
    });
    renderData(tab);
}

function filterByRating(rating) {
    currentRatingFilter = rating;
    document.querySelectorAll('#media-rating-filters .cat-btn').forEach(btn => {
        const btnText = btn.innerText.trim();
        if (rating === '') {
            btn.classList.toggle('active', btnText === '全部');
        } else {
            btn.classList.toggle('active', btnText === '♥'.repeat(parseInt(rating)));
        }
    });
    renderData('media');
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.getElementById('btn-' + tabId).classList.add('active');
    if (tabId === 'settings') renderBackupStats();
    else if (tabId === 'body') { renderPeriodData(); renderCalendar(); renderPeriodPredict(); }
    else if (tabId === 'finance') { renderFinanceOverview(); renderData(tabId); }
    else if (tabId === 'selflove') { renderExpiryAlert(); renderData(tabId); }
    else renderData(tabId);
}

function addData(type) {
    let data = JSON.parse(localStorage.getItem(type) || '[]');
    let entry = { id: Date.now() };
    const today = getTodayString();
    if (type === 'media') {
        entry.category = document.getElementById('media-type').value;
        entry.title = document.getElementById('media-title').value;
        entry.rating = document.getElementById('media-rating').value;
        entry.date = document.getElementById('media-date').value || today;
        if (!entry.title) return;
        document.getElementById('media-title').value = '';
        closeForm('media-form', 'toggle-media-form');
    } else if (type === 'selflove') {
        entry.category = document.getElementById('selflove-type').value;
        entry.name = document.getElementById('selflove-name').value;
        entry.price = document.getElementById('selflove-price').value;
        entry.buyDate = document.getElementById('selflove-buy-date').value || today;
        entry.expiryDate = document.getElementById('selflove-expiry-date').value;
        if (!entry.name) return;
        document.getElementById('selflove-name').value = '';
        document.getElementById('selflove-price').value = '';
        document.getElementById('selflove-expiry-date').value = '';
        closeForm('selflove-form', 'toggle-selflove-form');
    } else if (type === 'finance') {
        entry.category = document.getElementById('finance-type').value;
        entry.title = document.getElementById('finance-title').value;
        entry.date = document.getElementById('finance-date').value || today;
        if (!entry.title) return;
        document.getElementById('finance-title').value = '';
        closeForm('finance-form', 'toggle-finance-form');
    } else if (type === 'notes') {
        entry.title = document.getElementById('note-title').value;
        entry.content = document.getElementById('note-content').value;
        entry.date = document.getElementById('note-date').value || today;
        if (!entry.title && !entry.content) return;
        document.getElementById('note-title').value = '';
        document.getElementById('note-content').value = '';
        closeForm('notes-form', 'toggle-notes-form');
    }
    data.unshift(entry);
    localStorage.setItem(type, JSON.stringify(data));
    resetDates();
    initFilters();
    renderData(type);
    if (type === 'finance') renderFinanceOverview();
    if (type === 'selflove') renderExpiryAlert();
    showToast('✓ 已記錄');
}

function deleteData(type, id) {
    if (!confirm('確定要移除這項紀錄嗎？')) return;
    let data = JSON.parse(localStorage.getItem(type)).filter(item => item.id !== id);
    localStorage.setItem(type, JSON.stringify(data));
    renderData(type);
    if (type === 'finance') renderFinanceOverview();
    if (type === 'selflove') renderExpiryAlert();
}

function renderData(type) {
    const container = document.getElementById(type + '-list');
    let data = JSON.parse(localStorage.getItem(type) || '[]');
    const fYear = document.getElementById('f-' + type + '-year').value;
    const fMonth = document.getElementById('f-' + type + '-month').value;
    const fSearch = document.getElementById('f-' + type + '-search').value.toLowerCase();

    data = data.filter(i => {
        const dateKey = type === 'selflove' ? i.buyDate : i.date;
        const matchYear = fYear ? (dateKey || '').startsWith(fYear) : true;
        const matchMonth = fMonth ? (dateKey || '').split('-')[1] === fMonth : true;
        let matchCategory = true;
        if ((type === 'media' || type === 'selflove') && currentFilters[type] !== '全部') matchCategory = i.category === currentFilters[type];
        if (type === 'finance' && currentFilters[type] !== '全部') matchCategory = (i.category || '').includes(currentFilters[type]);
        let matchRating = true;
        if (type === 'media' && currentRatingFilter !== '') matchRating = String(i.rating) === String(currentRatingFilter);
        let nameKey = '';
        if (type === 'media') nameKey = (i.title || '') + (i.category || '');
        else if (type === 'selflove') nameKey = (i.name || '') + (i.category || '');
        else if (type === 'finance') nameKey = (i.category || '') + (i.title || '');
        else if (type === 'notes') nameKey = (i.title || '') + (i.content || '');
        const matchSearch = fSearch ? nameKey.toLowerCase().includes(fSearch) : true;
        return matchYear && matchMonth && matchSearch && matchCategory && matchRating;
    });

    if (data.length === 0) { container.innerHTML = '<div class="empty-state">尚未發現碎片。</div>'; return; }
    const today = new Date();
    let html = '';
    data.forEach(i => {
        html += '<div class="item-card"><div class="item-info">';
        if (type === 'media') {
            const ratingNum = parseInt(i.rating || '0');
            const hearts = ratingNum > 0 ? '♥'.repeat(ratingNum) : '';
            html += '<h4><span class="tag">' + i.category + '</span>' + i.title + '</h4>';
            if (hearts) html += '<p style="color:#c9856a;font-size:0.95rem;letter-spacing:3px;margin:2px 0;">' + hearts + '</p>';
            html += '<p>' + i.date + ' 紀錄</p>';
        } else if (type === 'selflove') {
            let status = '';
            if (i.expiryDate) {
                const diff = (new Date(i.expiryDate) - today) / 86400000;
                if (diff < 0) status = ' <span style="color:var(--alert-red);font-size:0.75rem;">已過期</span>';
                else if (diff <= 30) status = ' <span style="color:var(--warn-yellow);font-size:0.75rem;">即將到期</span>';
            }
            html += '<h4><span class="tag">' + i.category + '</span>' + i.name + status + '</h4>';
            html += '<p>金額：$' + Number(i.price || 0).toLocaleString() + ' / 購入：' + i.buyDate + '</p>';
            if (i.expiryDate) html += '<p style="font-size:0.75rem;color:var(--text-secondary)">效期：' + i.expiryDate + '</p>';
        } else if (type === 'finance') {
            html += '<h4><span class="tag">' + (i.category || '') + '</span>' + (i.title || '') + '</h4><p>' + i.date + '</p>';
        } else if (type === 'notes') {
            html += '<h4>' + (i.title || '無標題') + '</h4><p>' + (i.content || '') + '</p><p style="font-size:0.7rem;color:var(--text-secondary)">' + i.date + '</p>';
        }
        html += '</div><span class="delete-link" onclick="deleteData(\'' + type + '\',' + i.id + ')">移除</span></div>';
    });
    container.innerHTML = html;
}

function renderExpiryAlert() {
    const data = JSON.parse(localStorage.getItem('selflove') || '[]');
    const today = new Date(); today.setHours(0,0,0,0);
    const el = document.getElementById('selflove-expiry-alert');
    const expiring = data
        .filter(i => i.expiryDate)
        .map(i => ({ ...i, diff: Math.ceil((new Date(i.expiryDate) - today) / 86400000) }))
        .filter(i => i.diff <= 30)
        .sort((a, b) => a.diff - b.diff);
    if (expiring.length === 0) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    let html = '<div class="expiry-alert-title">⏰ 效期提醒 · ' + expiring.length + ' 項</div>';
    expiring.forEach(i => {
        let badge, label;
        if (i.diff < 0) { badge = 'badge-expired'; label = '已過期'; }
        else if (i.diff === 0) { badge = 'badge-urgent'; label = '今天到期'; }
        else if (i.diff <= 7) { badge = 'badge-urgent'; label = '剩 ' + i.diff + ' 天'; }
        else { badge = 'badge-warn'; label = '剩 ' + i.diff + ' 天'; }
        html += '<div class="expiry-item"><span class="expiry-item-name"><span class="tag">' + i.category + '</span>' + i.name + '</span><span class="expiry-badge ' + badge + '">' + label + '</span></div>';
    });
    el.innerHTML = html;
}

function renderFinanceOverview() {
    const data = JSON.parse(localStorage.getItem('finance') || '[]');
    const latest = {};
    data.forEach(item => { if (!latest[item.category] || item.date > latest[item.category].date) latest[item.category] = item; });
    const banks = Object.values(latest);
    const el = document.getElementById('finance-overview');
    if (banks.length === 0) { el.innerHTML = '<p style="font-size:0.8rem;color:var(--text-secondary);margin:0;">尚無任何帳戶紀錄。</p>'; return; }
    const total = banks.reduce((s, b) => s + parseFloat(b.title || 0), 0);
    let html = '<h3>各帳戶最新結餘</h3><div class="finance-total">$ ' + total.toLocaleString('zh-TW', {maximumFractionDigits:0}) + '</div>';
    banks.sort((a, b) => parseFloat(b.title) - parseFloat(a.title)).forEach(b => {
        html += '<div class="bank-row"><span class="bank-name">' + b.category + '</span><span>$ ' + parseFloat(b.title||0).toLocaleString('zh-TW',{maximumFractionDigits:0}) + ' <span style="font-size:0.7rem;color:var(--text-secondary);margin-left:4px;">' + b.date + '</span></span></div>';
    });
    el.innerHTML = html;
}

function showBodyTab(tabId) {
    document.querySelectorAll('.body-subcontent').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.body-subtab').forEach(b => b.classList.remove('active'));
    document.getElementById('body-' + tabId).classList.add('active');
    document.getElementById('btn-' + tabId).classList.add('active');
    if (tabId === 'weight') { renderWeightData(); renderWeightChart(); }
    else { renderPeriodData(); renderCalendar(); renderPeriodPredict(); }
}

function toggleSymptom(btn, sym) {
    btn.classList.toggle('selected');
    if (selectedSymptoms.includes(sym)) selectedSymptoms = selectedSymptoms.filter(s => s !== sym);
    else selectedSymptoms.push(sym);
}

function addPeriod() {
    const start = document.getElementById('period-start').value;
    if (!start) { showToast('請填寫開始日期'); return; }
    const end = document.getElementById('period-end').value;
    let data = JSON.parse(localStorage.getItem('period') || '[]');
    data.unshift({ id: Date.now(), start, end });
    localStorage.setItem('period', JSON.stringify(data));
    document.getElementById('period-end').value = '';
    resetDates();
    closeForm('period-form', 'toggle-period-form');
    renderPeriodData(); renderCalendar(); renderPeriodPredict();
    showToast('✓ 月經已記錄');
}

function addSymptom() {
    const date = document.getElementById('symptom-date').value || getTodayString();
    if (selectedSymptoms.length === 0) { showToast('請至少選擇一個症狀'); return; }
    let data = JSON.parse(localStorage.getItem('symptom') || '[]');
    data.unshift({ id: Date.now(), date, symptoms: [...selectedSymptoms] });
    localStorage.setItem('symptom', JSON.stringify(data));
    selectedSymptoms = [];
    document.querySelectorAll('.symptom-check-btn').forEach(b => b.classList.remove('selected'));
    resetDates();
    closeForm('symptom-form', 'toggle-symptom-form');
    renderPeriodData(); renderCalendar();
    showToast('✓ 症狀已記錄');
}

function deletePeriod(type, id) {
    if (!confirm('確定要移除？')) return;
    let data = JSON.parse(localStorage.getItem(type) || '[]').filter(i => i.id !== id);
    localStorage.setItem(type, JSON.stringify(data));
    renderPeriodData(); renderCalendar(); renderPeriodPredict();
}

function filterPeriodSymptom(sym) {
    currentPeriodSymptomFilter = sym;
    document.querySelectorAll('#period-symptom-filters .cat-btn').forEach(b => b.classList.toggle('active', b.innerText === sym));
    renderPeriodData();
}

function renderPeriodData() {
    const periodData = JSON.parse(localStorage.getItem('period') || '[]');
    const symptomData = JSON.parse(localStorage.getItem('symptom') || '[]');
    let combined = [
        ...periodData.map(i => ({ ...i, _type: 'period', _sortDate: i.start })),
        ...symptomData.map(i => ({ ...i, _type: 'symptom', _sortDate: i.date }))
    ].sort((a, b) => b._sortDate.localeCompare(a._sortDate));
    const f = currentPeriodSymptomFilter;
    if (f !== '全部') combined = combined.filter(i => f === '月經' ? i._type === 'period' : i._type === 'symptom' && i.symptoms && i.symptoms.includes(f));
    const container = document.getElementById('period-list');
    if (combined.length === 0) { container.innerHTML = '<div class="empty-state">尚無紀錄。</div>'; return; }
    let html = '';
    combined.forEach(i => {
        if (i._type === 'period') {
            const dur = i.end ? Math.round((new Date(i.end) - new Date(i.start)) / 86400000) + 1 : null;
            html += '<div class="item-card"><div class="item-info"><h4><span class="tag" style="color:var(--period-red);border-color:var(--period-red);">月經</span>' + i.start + (i.end ? ' → ' + i.end : ' → 記錄中') + '</h4><p>' + (dur ? dur + ' 天' : '尚未結束') + '</p></div><span class="delete-link" onclick="deletePeriod(\'period\',' + i.id + ')">移除</span></div>';
        } else {
            const syms = i.symptoms.map(s => '<span class="tag">' + s + '</span>').join('');
            html += '<div class="item-card"><div class="item-info"><h4>' + syms + '</h4><p>' + i.date + '</p></div><span class="delete-link" onclick="deletePeriod(\'symptom\',' + i.id + ')">移除</span></div>';
        }
    });
    container.innerHTML = html;
}

function getPeriodStats() {
    const data = JSON.parse(localStorage.getItem('period') || '[]').filter(i => i.start).sort((a, b) => a.start < b.start ? -1 : 1);
    if (data.length === 0) return null;
    const durations = data.filter(i => i.end).map(i => Math.round((new Date(i.end) - new Date(i.start)) / 86400000) + 1);
    const avgDuration = durations.length ? Math.round(durations.reduce((a,b) => a+b,0) / durations.length) : 5;
    const cycles = [];
    for (let i = 1; i < data.length; i++) {
        const diff = Math.round((new Date(data[i].start) - new Date(data[i-1].start)) / 86400000);
        if (diff > 15 && diff < 60) cycles.push(diff);
    }
    const avgCycle = cycles.length ? Math.round(cycles.reduce((a,b) => a+b,0) / cycles.length) : 28;
    return { last: data[data.length-1], avgDuration, avgCycle };
}

function renderPeriodPredict() {
    const stats = getPeriodStats();
    const el = document.getElementById('period-predict');
    if (!stats) { el.innerHTML = '<p style="font-size:0.8rem;color:var(--text-secondary);margin:0;">還沒有足夠的紀錄來預測，至少需要一筆資料。</p>'; return; }
    const { last, avgDuration, avgCycle } = stats;
    const predictDate = new Date(last.start);
    predictDate.setDate(predictDate.getDate() + avgCycle);
    const today = new Date(); today.setHours(0,0,0,0);
    const daysLeft = Math.ceil((predictDate - today) / 86400000);
    const predictStr = predictDate.toISOString().split('T')[0];
    const countdownHtml = daysLeft > 0
        ? '<div class="predict-countdown">' + daysLeft + ' 天後</div>'
        : daysLeft === 0
            ? '<div class="predict-countdown">今天</div>'
            : '<div class="predict-countdown" style="color:var(--text-secondary)">已過 ' + Math.abs(daysLeft) + ' 天</div>';
    el.innerHTML = '<div style="font-size:0.75rem;color:var(--text-secondary);letter-spacing:1px;margin-bottom:10px;">下次預測來潮</div>' + countdownHtml + '<div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:12px;">' + predictStr + '</div><div class="predict-row"><span class="predict-label">上次開始</span><span>' + last.start + '</span></div><div class="predict-row"><span class="predict-label">平均週期</span><span>' + avgCycle + ' 天</span></div><div class="predict-row"><span class="predict-label">平均經期</span><span>' + avgDuration + ' 天</span></div>';
}

function initCalView() { const n = new Date(); calViewYear = n.getFullYear(); calViewMonth = n.getMonth(); }

function changeCalMonth(delta) {
    calViewMonth += delta;
    if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
    if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
    renderCalendar();
}

function renderCalendar() {
    if (calViewYear === undefined) initCalView();
    const periodData = JSON.parse(localStorage.getItem('period') || '[]');
    const symptomData = JSON.parse(localStorage.getItem('symptom') || '[]');
    const today = new Date(); today.setHours(0,0,0,0);
    const stats = getPeriodStats();
    const periodDays = new Set(), symptomDays = new Set(), predictedDays = new Set();
    periodData.forEach(e => {
        if (!e.start) return;
        const end = e.end ? new Date(e.end) : new Date(e.start);
        for (let d = new Date(e.start); d <= end; d.setDate(d.getDate()+1)) periodDays.add(d.toISOString().split('T')[0]);
    });
    symptomData.forEach(e => { if (e.date) symptomDays.add(e.date); });
    if (stats) {
        const ps = new Date(stats.last.start);
        ps.setDate(ps.getDate() + stats.avgCycle);
        for (let i = 0; i < stats.avgDuration; i++) { const d = new Date(ps); d.setDate(d.getDate()+i); predictedDays.add(d.toISOString().split('T')[0]); }
    }
    const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    document.getElementById('cal-title').textContent = calViewYear + ' · ' + monthNames[calViewMonth];
    const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
    const daysInMonth = new Date(calViewYear, calViewMonth+1, 0).getDate();
    let html = ['日','一','二','三','四','五','六'].map(d => '<div class="cal-day-name">' + d + '</div>').join('');
    for (let i = 0; i < firstDay; i++) html += '<div></div>';
    for (let d = 1; d <= daysInMonth; d++) {
        const ds = calViewYear + '-' + String(calViewMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        let cls = 'cal-day';
        if (periodDays.has(ds)) cls += ' period-day';
        else if (predictedDays.has(ds)) cls += ' predicted';
        if (symptomDays.has(ds)) cls += ' symptom-day';
        if (new Date(calViewYear, calViewMonth, d).getTime() === today.getTime()) cls += ' today';
        html += '<div class="' + cls + '">' + d + '</div>';
    }
    document.getElementById('cal-grid').innerHTML = html;
}

function addWeight() {
    const val = document.getElementById('weight-value').value;
    const date = document.getElementById('weight-date').value || getTodayString();
    if (!val) return;
    let data = JSON.parse(localStorage.getItem('weight') || '[]');
    data.unshift({ id: Date.now(), weight: parseFloat(val), date });
    localStorage.setItem('weight', JSON.stringify(data));
    document.getElementById('weight-value').value = '';
    resetDates();
    closeForm('weight-form', 'toggle-weight-form');
    renderWeightData(); renderWeightChart();
    showToast('✓ 體重已記錄');
}

function deleteWeight(id) {
    if (!confirm('確定要移除？')) return;
    let data = JSON.parse(localStorage.getItem('weight') || '[]').filter(i => i.id !== id);
    localStorage.setItem('weight', JSON.stringify(data));
    renderWeightData(); renderWeightChart();
}

function renderWeightData() {
    const data = JSON.parse(localStorage.getItem('weight') || '[]');
    const el = document.getElementById('weight-stats');
    if (data.length === 0) { el.innerHTML = ''; document.getElementById('weight-list').innerHTML = '<div class="empty-state">尚無體重紀錄。</div>'; return; }
    const weights = data.map(d => d.weight);
    el.innerHTML = '<div class="weight-stat">最新 <span>' + weights[0].toFixed(1) + ' kg</span></div><div class="weight-stat">平均 <span>' + (weights.reduce((a,b)=>a+b,0)/weights.length).toFixed(1) + ' kg</span></div><div class="weight-stat">最低 <span>' + Math.min(...weights).toFixed(1) + ' kg</span></div><div class="weight-stat">最高 <span>' + Math.max(...weights).toFixed(1) + ' kg</span></div>';
    document.getElementById('weight-list').innerHTML = data.map(i => '<div class="item-card"><div class="item-info"><h4>' + i.weight.toFixed(1) + ' kg</h4><p>' + i.date + '</p></div><span class="delete-link" onclick="deleteWeight(' + i.id + ')">移除</span></div>').join('');
}

function renderWeightChart() {
    const data = JSON.parse(localStorage.getItem('weight') || '[]').slice().reverse();
    const canvas = document.getElementById('weightChart');
    if (weightChartInstance) { weightChartInstance.destroy(); weightChartInstance = null; }
    if (data.length === 0) return;
    const weights = data.map(d => d.weight);
    weightChartInstance = new Chart(canvas, {
        type: 'line',
        data: { labels: data.map(d => d.date.slice(5)), datasets: [{ data: weights, borderColor: '#7d8471', backgroundColor: 'rgba(125,132,113,0.08)', pointBackgroundColor: '#7d8471', pointRadius: 4, tension: 0.3, fill: true }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { autoSkip: true, maxTicksLimit: 8, font: { size: 10 } }, grid: { display: false } }, y: { min: Math.min(...weights)-1, max: Math.max(...weights)+1, ticks: { font: { size: 10 } }, grid: { color: 'rgba(0,0,0,0.05)' } } } }
    });
}

function renderBackupStats() {
    const labels = { media:'閱聽', selflove:'對自己好', finance:'餘裕', notes:'隨手記記', period:'生理期', symptom:'症狀', weight:'體重' };
    document.getElementById('backup-stats').innerHTML = allStoreKeys.map(t => '<div class="stat-chip">' + labels[t] + ' <span>' + JSON.parse(localStorage.getItem(t)||'[]').length + '</span> 筆</div>').join('');
}

function downloadBackup() {
    const backup = { exportedAt: new Date().toISOString(), version: 2, data: {} };
    allStoreKeys.forEach(t => { backup.data[t] = JSON.parse(localStorage.getItem(t) || '[]'); });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' }));
    a.download = 'life-fragments-backup-' + getTodayString() + '.json';
    a.click();
    showToast('✓ 備份檔案已下載');
}

function readBackupFile(file) {
    return new Promise((resolve, reject) => {
        if (!file || !file.name.endsWith('.json')) { reject('請選擇 .json 備份檔案'); return; }
        const reader = new FileReader();
        reader.onload = e => { try { const p = JSON.parse(e.target.result); if (!p.data) throw 0; resolve(p); } catch { reject('檔案格式不正確。'); } };
        reader.onerror = () => reject('讀取失敗');
        reader.readAsText(file);
    });
}

async function handleRestoreFile(event) {
    const file = event.target.files[0]; if (!file) return;
    try { pendingRestoreData = await readBackupFile(file); showToast('✓ 已讀取備份（' + new Date(pendingRestoreData.exportedAt).toLocaleDateString('zh-TW') + '），請點選還原方式'); }
    catch (err) { showToast('⚠ ' + err, 3500); pendingRestoreData = null; }
    event.target.value = '';
}

function triggerRestore(mode) {
    if (!pendingRestoreData) { showToast('請先選取備份 JSON 檔案', 2500); document.getElementById('restore-file-input').click(); return; }
    applyRestore(pendingRestoreData, mode);
}

function applyRestore(backup, mode) {
    if (!confirm('確定要' + (mode === 'merge' ? '合併' : '覆蓋') + '還原嗎？')) return;
    allStoreKeys.forEach(t => {
        const incoming = backup.data[t] || [];
        if (mode === 'overwrite') { localStorage.setItem(t, JSON.stringify(incoming)); }
        else {
            const existing = JSON.parse(localStorage.getItem(t) || '[]');
            const ids = new Set(existing.map(x => x.id));
            const merged = [...existing, ...incoming.filter(x => !ids.has(x.id))].sort((a,b) => b.id - a.id);
            localStorage.setItem(t, JSON.stringify(merged));
        }
    });
    pendingRestoreData = null; initFilters(); renderBackupStats();
    showToast('✓ ' + (mode === 'merge' ? '合併' : '覆蓋') + '還原完成！', 3000);
}

function handleDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function handleDragLeave() { document.getElementById('drop-zone').classList.remove('drag-over'); }
async function handleDrop(e) {
    e.preventDefault(); document.getElementById('drop-zone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0]; if (!file) return;
    try { pendingRestoreData = await readBackupFile(file); showToast('✓ 已讀取備份（' + new Date(pendingRestoreData.exportedAt).toLocaleDateString('zh-TW') + '），請點選還原方式'); }
    catch (err) { showToast('⚠ ' + err, 3500); }
}

window.onload = () => {
    initCalView(); resetDates(); initFilters();
    renderData('media'); renderFinanceOverview();
};
</script>
